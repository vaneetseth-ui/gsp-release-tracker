# .gitlab-ci.yml — GSP Release Tracker GitLab pipeline
#
# Runs inside RingCentral corporate network so it can reach jira.ringcentral.com.
# Includes GitLab's SAST template and the existing Jira -> Heroku sync job.
#
# Required CI/CD variable:
#   JIRA_PAT — Jira Personal Access Token (masked + protected)

stages:
  - test
  - sync

include:
  - template: Security/SAST.gitlab-ci.yml

sast:
  stage: test

sync-jira:
  stage: sync
  image: node:20-alpine
  timeout: 10 minutes

  variables:
    JIRA_URL: "https://jira.ringcentral.com"
    HEROKU_URL: "https://gsp-release-tracker-ffa0c1ec9485.herokuapp.com"

  script:
    - echo "Starting Jira -> Heroku sync at $(date -u)"
    - node scripts/sync-local.js

  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "api"'

  after_script:
    - echo "Pipeline finished at $(date -u) with exit code $CI_JOB_STATUS"
